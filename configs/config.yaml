defaults:
  - env: default
  - models: ppo
  - _self_

# Global device setting — "auto" picks CUDA if available
device: auto

# Logging
logging:
  wandb:
    project: "cogniland"
    entity: crusoe
    mode: "online"    # "online", "offline", or "disabled"
    store_last_ckpt: false
  trajectory:
    save_frequency: 500
    max_saved_per_eval: 3
    save_on_success: true
    save_on_death: true
  behavioral_metrics: true
  eval:
    hp_danger_threshold: 30.0
    deterministic_episodes: 16
    stochastic_episodes: 16

# Hydra output directory
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
