defaults:
  - env: default
  - models: ppo
  - _self_

# Global device setting — "auto" picks CUDA if available
device: auto

# PPO hyperparameters
training:
  num_envs: 32
  total_timesteps: 1000000
  rollout_steps: 128
  num_epochs: 4
  minibatch_size: 256
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  max_grad_norm: 0.5
  anneal_lr: true
  # Evaluation & checkpointing
  eval_interval: 10
  eval_episodes: 16
  checkpoint_interval: 50

# Logging
logging:
  wandb:
    project: "cogniland"
    entity: crusoe
    mode: "online"    # "online", "offline", or "disabled"
  trajectory:
    save_frequency: 5
    max_saved_per_eval: 4
    save_on_success: true
    save_on_death: true
  behavioral_metrics: true

# Hydra output directory
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
