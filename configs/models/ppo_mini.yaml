defaults:
  - ppo

name: ppo_mini

# ── Compact PPO variant for faster runs (~15k params vs ~96k for full ppo) ──
#
#   CNN:        Conv(2→8) + Conv(8→16) + AdaptivePool(3) → 16×3×3 = 144 out
#   Scalar net: Linear(7→32)                             → 32 out
#   Trunk ×2:   Linear(176→64) + Linear(64→64)
#   Actor/Critic heads on 64-dim features
#
cnn_channels: 16         # second conv = 16 ch, first = 8 ch (vs 32/16)
cnn_out_spatial: 3       # pool to 3×3 = 9 cells             (vs 4×4 = 16)
scalar_hidden: 32        # scalar MLP width                   (vs 64)
hidden_dim: 64           # trunk width                        (vs 128)

training:
  parallel_envs: 32             # still lighter than full PPO but less noisy
  moves_per_rollout: 64         # match main PPO rollout length
  total_env_moves: 2_500_000     # a bit more budget for larger maps

  minibatch_size: 128          # proportional to larger rollout
  learning_rate: 0.0003        # align with main PPO for stability
