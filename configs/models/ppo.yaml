name: ppo

# ── Network architecture ──
scalar_dim: 6            # Number of scalar inputs (compass_x, compass_y, terrain, terrain_clock, resources, hp)
minimap_channels: 1      # Minimap input channels (1 = heightmap only)
hidden_dim: 128          # Trunk hidden layer width
action_dim: 5            # Output actions (up, down, right, left, stay)

training:

  # ── Rollout collection ──
  parallel_envs: 32             # How many environments run in parallel during rollout
  moves_per_rollout: 128        # How many moves each env makes before the model learns
  total_env_moves: 1_000_000    # Total moves budget across all envs for the entire training

  # ── PPO optimisation ──
  epochs_per_update: 4          # How many times the model re-studies each rollout's data
  minibatch_size: 256           # Transitions per gradient step
  learning_rate: 0.0003         # Adam optimiser initial learning rate
  anneal_lr: true               # Linearly decay LR to 0 over training

  # ── Advantage estimation (GAE) ──
  discount_factor: 0.99         # γ — how much future rewards matter (1.0 = greedy long-term)
  gae_lambda: 0.95              # λ — bias-variance tradeoff in advantage estimates

  # ── Loss coefficients ──
  policy_clip_range: 0.2        # ε — max allowed policy ratio change per update
  value_loss_weight: 0.5        # Weight of critic loss in the total loss
  entropy_bonus_weight: 0.01    # Weight of entropy bonus (promotes exploration)
  max_grad_norm: 0.5            # Gradient clipping threshold for stability

  # ── Evaluation & checkpointing ──
  eval_every_n_updates: 10      # Run evaluation every N training updates
  eval_episodes: 16             # Number of full episodes per evaluation
  checkpoint_every_n_updates: 50 # Save model checkpoint every N training updates
