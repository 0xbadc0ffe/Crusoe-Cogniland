# Island generation
size: 250
scale: 0.33
octaves: 6
persistence: 0.5
lacunarity: 2.0
seed: 42
detailed_ocean: true
filtering: "square"
sink_mode: 1

# Agent parameters
init_hp: 75.0
max_hp: 100.0
init_resources: 0.0
max_sea_movement_without_resources: 7
hard_mode: false

# Terrain effects
passive_heal_rate: 1.0
land_to_water_penalty: 3.0
forest_hp_gain: 4.0
forest_resource_gain: 1.0
sea_resource_costs: [0.75, 0.50, 0.25]     # ocean, deep_water, water
sea_hp_costs: [25.0, 25.0, 10.0]            # ocean, deep_water, water
mountain_resource_costs: [0.25, 0.75]        # rocky, mountains
mountain_hp_costs: [5.0, 20.0]              # rocky, mountains
hard_mode_resource_drain: 0.25
hard_mode_hp_gain: 1.0
hard_mode_hp_loss: 0.5

# Minimap
minimap_ray: 25
minimap_max_ray: 10              # Fixed CNN spatial dim = 2*max_ray+1 = 21
minimap_occlude: true
minimap_min_clear_lv: 0.25

# Episode limits
max_steps: 1000

# Reward coefficients
reward_dist_coef: 1.0
reward_reach_bonus: 10.0
reward_death_penalty: -5.0
reward_time_penalty: -0.01
reward_hp_coef: 0.01
reward_hp_thresh: 30.0
