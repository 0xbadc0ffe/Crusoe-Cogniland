# Island generation
size: 250
scale: 0.33
octaves: 6
persistence: 0.5
lacunarity: 2.0
seed: 42
detailed_ocean: true
filtering: "square"
sink_mode: 1

# Agent parameters
init_hp: 100.0
max_hp: 100.0
init_resources: 30.0
max_resources: 100.0
hard_mode: false

# Terrain effects
passive_heal_rate: 0.0
land_to_water_resource_cost: 10.0       # Boat construction cost (resources)
land_to_water_hp_per_missing_res: 5.0   # HP penalty per missing resource
land_resource_drain: 1.0                # Beach, sandy, grassland drain per step
no_res_hp_multiplier: 2.0              # HP lost per missing resource unit (all terrains)
forest_hp_gain: 5.0                    # Healing per step when below max HP
forest_resource_gain: 2.0              # Resources per step when at max HP
sea_resource_costs: [3.0, 2.0, 1.5]   # Ocean, deep_water, water (per step, no free window)
mountain_resource_costs: [1.5, 3.0]   # Rocky, mountains

hard_mode_resource_drain: 0.25
hard_mode_hp_gain: 1.0
hard_mode_hp_loss: 0.5

# Minimap (scaled ×3 for 250×250 maps)
minimap_ray: 15
minimap_max_ray: 21               # CNN spatial dim = 2*max_ray+1 = 43
minimap_occlude: true
minimap_clear_tolerance: 0.1

# Episode limits
max_steps: 1000

# Reward coefficients
reward_dist_coef: 1.0
reward_reach_bonus: 50.0
reward_death_penalty: -20.0
reward_time_penalty: -0.01
reward_hp_coef: 0.05
reward_hp_thresh: 35.0
reward_resource_coef: 0.05
reward_resource_thresh: 20.0

# Map pool (Level Replay) — number of procedural maps to pre-generate
map_pool_size: 16

# Custom map support (empty = procedurally generated)
map_name: ""
spawn_r: -1
spawn_c: -1
target_r: -1
target_c: -1
